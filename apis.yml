aid: buildah
name: Buildah
description: >-
  Buildah is an open-source, Linux-based command-line tool for building
  OCI-compliant container images without requiring a full container runtime or
  daemon. It allows building images from scratch or using Dockerfiles, with
  fine-grained control over image layers. Buildah supports rootless builds in
  unprivileged environments and integrates seamlessly with Podman and Skopeo as
  part of the containers organization. It is commonly used in Kubernetes-based
  CI/CD pipelines to avoid Docker-in-Docker complexity.
