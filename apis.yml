aid: buildah
name: Buildah
description: >-
  Buildah is an open-source, Linux-based tool for building OCI-compliant container images without requiring a full container runtime or daemon. It allows you to create images from scratch or using a Dockerfile, with fine-grained control over image layers, and is part of the Containers project alongside Podman and Skopeo.
